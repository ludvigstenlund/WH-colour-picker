<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>colour_picker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com"> <!--Importerar en font-->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&display=swap" rel="stylesheet">
    
    <!--Länkar till css--> 
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/colordata.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/footer.css">
  </head>

  <body>
    <header>
      <!--Navbar överst--> 
      <nav class="sticky navbar">
        <a class="navitem" href="https://www.warhammer-community.com/en-gb/"> <img class="navitem" src="/images/WarhammerLogoSmall.png" alt="Warhammer"></a>
        <ul>
          <li> <a class="navitem" href="huvudsida.html">Home</a></li>
          <li> <a class="navitem nuvarande_sida" href="colour-picker.html">Colour Picker</a></li>
          <li> <a class="navitem" href="exbilder.html">Example images</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <h1>Sök efter färg</h1>

      <!--Sökfunktioner för javascript--> 
      <section>
        <input id="search" type="text" placeholder="Search for a colour:" oninput="filterByName(event)"><br>

        <button id="base">Base paints</button>
        <button id="layer">Layer paints</button>
        <button id="shade">Shade paints</button>
        <button id="dry">Dry paints</button>
        <button id="edge">Edge paints</button>
        <button id="technical">Technical paints</button>
        <button id="texture">Texture paints</button>
        <button id="contrast">Contrast paints</button>

        <h2>Results:</h2>
      
        <div id="results" class="flexbox"></div>

      </section>
      <script src="/JavaScript/GetPaint.js"></script>
      <script src="/JavaScript/toggleOnOff.js"></script>

    </main>

    <footer>
        <form class="navitem footeritem">
            <h3>Write to us:</h3><br>
            Your email: <br>
            <input type="email" placeholder="Write your email here:"><br>
            Your message: <br>
            <input type="text" placeholder="Write your subject here:"><br>
            <input type="text" placeholder="Write your message here:"><br>
            <input type="submit" id="submitMessage">
        </form>
        <div class="navitem footeritem"><h3>Who are we?</h3><br><a href="mailto:ludvig.stenlund@skola.taby.se">ludvig.stenlund@skola.taby.se</a></div>
        <div class="navitem footeritem"><h3>Find us:</h3><br><a href="https://www.warhammer.com/en-WW/store-finder">Warhammer store finder</a></div>
    </footer>

  </body>
